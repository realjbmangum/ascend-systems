    <path d="M-14,-4 C-14,-8 -10,-11 -6,-11 L-3,-11 C-1,-11 0,-10 0,-8 L0,-3 C0,-1 -1,0 -3,0 L-5,0 C-6,0 -6,1 -5,2 L5,2 C6,1 6,0 5,0 L3,0 C1,0 0,-1 0,-3 L0,-8 C0,-10 1,-11 3,-11 L6,-11 C10,-11 14,-8 14,-4 L14,4 C14,8 10,11 6,11 L-6,11 C-10,11 -14,8 -14,4 Z" fill="white" opacity="0"/>
  </g>

  <!-- Simplified phone icon -->
  <g fill="white">
    <!-- Handset -->
    <path d="M20,22 C18,20 18,17 20,15 L23,12 C24,11 26,11 27,12 L29,14 C30,15 30,17 29,18 L28,19 C27,20 27,21 28,22 L32,26 C33,27 34,27 35,26 L36,25 C37,24 39,24 40,25 L42,27 C43,28 43,30 42,31 L39,34 C37,36 34,36 32,35 L22,25 C21,24 20,23 20,22 Z"/>
  </g>

  <!-- Checkmark / steady indicator - amber accent -->
