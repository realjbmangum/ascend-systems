<!--
  Shared style block for all Ascend Systems strategy / marketing / outreach docs.
  Copy the <style> contents below into the <head> of any new .html doc in this repo.
  Brand palette: Deep Charcoal #1C1C1E (primary), Burnt Orange #C45A2C (accent),
  Off-White #FAFAF8 (page bg). Fonts: Inter (body), JetBrains Mono (code/data).
-->
<style>
  :root {
    --charcoal: #1C1C1E;
    --charcoal-soft: #2A2A2E;
    --charcoal-light: #3A3A3F;
    --orange: #C45A2C;
    --orange-light: #D4703F;
    --orange-dark: #A84820;
    --orange-glow: #FDF3ED;
    --bg: #FAFAF8;
    --gray-100: #F3F3F2;
    --gray-200: #E5E5E3;
    --gray-400: #9CA3AF;
    --gray-600: #6B7280;
    --white: #FFFFFF;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--charcoal);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 17px;
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
  }

  .doc {
    max-width: 820px;
    margin: 0 auto;
    padding: 64px 32px 96px;
  }

  .doc-header {
    border-bottom: 1px solid var(--gray-200);
    padding-bottom: 32px;
    margin-bottom: 48px;
  }

  .doc-eyebrow {
    font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--orange-dark);
    margin: 0 0 12px;
  }

  h1 {
    font-size: 44px;
    line-height: 1.1;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin: 0 0 16px;
    color: var(--charcoal);
  }

  h2 {
    font-size: 28px;
    line-height: 1.25;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin: 56px 0 16px;
    color: var(--charcoal);
  }

  h3 {
    font-size: 20px;
    line-height: 1.3;
    font-weight: 600;
    margin: 32px 0 12px;
    color: var(--charcoal);
  }

  h4 {
    font-size: 16px;
    line-height: 1.4;
    font-weight: 600;
    margin: 24px 0 8px;
    color: var(--charcoal);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  p { margin: 0 0 16px; }

  .lede {
    font-size: 20px;
    line-height: 1.5;
    color: var(--gray-600);
  }

  a {
    color: var(--orange-dark);
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  a:hover { color: var(--orange); }

  strong { font-weight: 600; color: var(--charcoal); }

  code, kbd, pre {
    font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
    font-size: 0.92em;
  }
  code {
    background: var(--gray-100);
    padding: 2px 6px;
    border-radius: 4px;
    color: var(--charcoal);
  }
  pre {
    background: var(--charcoal);
    color: #E5E5E3;
    padding: 20px 24px;
    border-radius: 8px;
    overflow-x: auto;
    line-height: 1.5;
  }
  pre code {
    background: transparent;
    color: inherit;
    padding: 0;
  }

  blockquote {
    margin: 24px 0;
    padding: 16px 24px;
    border-left: 3px solid var(--orange);
    background: var(--orange-glow);
    color: var(--charcoal);
    font-style: normal;
  }

  ul, ol { margin: 0 0 16px; padding-left: 24px; }
  li { margin-bottom: 6px; }

  hr {
    border: none;
    border-top: 1px solid var(--gray-200);
    margin: 48px 0;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin: 24px 0;
    font-size: 15px;
  }
  th, td {
    text-align: left;
    padding: 12px 16px;
    border-bottom: 1px solid var(--gray-200);
    vertical-align: top;
  }
  th {
    background: var(--gray-100);
    font-weight: 600;
    color: var(--charcoal);
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  tr:hover td { background: var(--gray-100); }

  .callout {
    margin: 24px 0;
    padding: 20px 24px;
    background: var(--charcoal);
    color: var(--white);
    border-radius: 8px;
  }
  .callout h3, .callout h4 { color: var(--white); margin-top: 0; }
  .callout a { color: var(--orange-light); }

  .tag {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    background: var(--orange-glow);
    color: var(--orange-dark);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-right: 6px;
  }
  .tag.gray { background: var(--gray-100); color: var(--gray-600); }
  .tag.dark { background: var(--charcoal); color: var(--white); }

  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin: 24px 0;
  }
  .grid-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    margin: 24px 0;
  }
  .card {
    border: 1px solid var(--gray-200);
    border-radius: 8px;
    padding: 20px;
    background: var(--white);
  }
  .card h4 { margin-top: 0; }

  .doc-footer {
    margin-top: 80px;
    padding-top: 24px;
    border-top: 1px solid var(--gray-200);
    font-size: 13px;
    color: var(--gray-600);
    font-family: 'JetBrains Mono', monospace;
  }

  @media (max-width: 640px) {
    .doc { padding: 32px 20px 64px; }
    h1 { font-size: 32px; }
    h2 { font-size: 24px; }
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
