<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ascend Systems — Software for mid-market operators</title>
  <link rel="stylesheet" href="styles/colors_and_type.css" />
  <link rel="stylesheet" href="styles/site.css" />
  <link rel="icon" href="assets/logo.png" />
  <style>
    /* Responsive overrides for the landing page */
    @media (max-width: 960px) {
      .hero-grid, .hero-exp-grid, .services-head, .case-layout, .cta-grid, .footer-grid, .testimonial-grid, .process-grid, .services-grid {
        grid-template-columns: 1fr !important;
      }
      .nav-links > a:not(:last-child) { display: none; }
      .process-line { display: none; }
      .stack-row { grid-template-columns: 1fr !important; }
    }
  </style>
</head>
<body id="top">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="components/Nav.jsx"></script>
  <script type="text/babel" src="components/Hero.jsx"></script>
  <script type="text/babel" src="components/TrustedBy.jsx"></script>
  <script type="text/babel" src="components/Services.jsx"></script>
  <script type="text/babel" src="components/Process.jsx"></script>
  <script type="text/babel" src="components/CaseStudies.jsx"></script>
  <script type="text/babel" src="components/Stack.jsx"></script>
  <script type="text/babel" src="components/Testimonials.jsx"></script>
  <script type="text/babel" src="components/FAQ.jsx"></script>
  <script type="text/babel" src="components/FinalCTA.jsx"></script>
  <script type="text/babel" src="components/Tweaks.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "hero": "conservative",
      "theme": "light",
      "accent": "#C45A2C"
    }/*EDITMODE-END*/;

    const App = () => {
      const [variant, setVariant] = React.useState(TWEAK_DEFAULTS.hero);
      const [theme, setTheme]     = React.useState(TWEAK_DEFAULTS.theme);
      const [accent, setAccent]   = React.useState(TWEAK_DEFAULTS.accent);

      React.useEffect(() => {
        document.body.classList.toggle('theme-dark', theme === 'dark');
      }, [theme]);

      React.useEffect(() => {
        // Derive light/dark variants from the base accent
        const base = accent;
        const lighten = (hex, pct) => {
          const n = parseInt(hex.slice(1), 16);
          const r = Math.min(255, ((n >> 16) & 255) + Math.round(255 * pct));
          const g = Math.min(255, ((n >> 8) & 255) + Math.round(255 * pct));
          const b = Math.min(255, (n & 255) + Math.round(255 * pct));
          return '#' + ((r << 16) | (g << 8) | b).toString(16).padStart(6, '0');
        };
        const darken = (hex, pct) => {
          const n = parseInt(hex.slice(1), 16);
          const r = Math.max(0, ((n >> 16) & 255) - Math.round(255 * pct));
          const g = Math.max(0, ((n >> 8) & 255) - Math.round(255 * pct));
          const b = Math.max(0, (n & 255) - Math.round(255 * pct));
          return '#' + ((r << 16) | (g << 8) | b).toString(16).padStart(6, '0');
        };
        document.documentElement.style.setProperty('--color-accent', base);
        document.documentElement.style.setProperty('--color-accent-light', lighten(base, 0.08));
        document.documentElement.style.setProperty('--color-accent-dark', darken(base, 0.08));
      }, [accent]);

      // Scroll reveal
      React.useEffect(() => {
        const io = new IntersectionObserver(entries => {
          entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('is-in'); });
        }, { threshold: 0.08 });
        document.querySelectorAll('[data-reveal]').forEach(el => io.observe(el));
        return () => io.disconnect();
      });

      return (
        <>
          <Hero variant={variant} />
          <TrustedBy />
          <div data-reveal><Services /></div>
          <div data-reveal><Process /></div>
          <div data-reveal><CaseStudies /></div>
          <div data-reveal><Stack /></div>
          <div data-reveal><Testimonials /></div>
          <div data-reveal><FAQ /></div>
          <FinalCTA />
          <Footer />
          <Tweaks
            variant={variant} setVariant={setVariant}
            theme={theme} setTheme={setTheme}
            accent={accent} setAccent={setAccent}
          />
        </>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
